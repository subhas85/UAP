# engineer profile — daily work with some sensitive context.
# Permission mode: default (prompt before tool use). Autostart + remote control
# + concierge stay on for ergonomics, but every tool call is gated by an
# explicit prompt. The right choice for a developer workstation that touches
# private code, internal services, or anything you wouldn't want fired off
# without thinking about it first.
#
# Copy to ~/uap.local/identity.yaml and fill in operator-specific fields before applying.
schema_version: 1

os:
  name: UAP
  name_lower: uap
  tagline: out of this world
  hostname: my-uap-box       # <-- override per machine

operator:
  username: operator         # <-- override (the Linux user UAP is installed for)
  email: operator@example.com
  role: engineer

theme:
  palette: tokyo-night
  bg_hex:       "#1a1b26"
  bg_alt_hex:   "#24283b"
  bg_r:         "0.102"
  bg_g:         "0.106"
  bg_b:         "0.149"
  fg_hex:       "#a9b1d6"
  fg_dim_hex:   "#787c99"
  accent_hex:   "#7aa2f7"
  urgent_hex:   "#f7768e"
  green_hex:    "#9ece6a"
  yellow_hex:   "#e0af68"
  purple_hex:   "#bb9af7"
  cyan_hex:     "#0db9d7"
  border_hex:   "#32344a"
  inactive_hex: "#444b6a"
  font: "JetBrainsMono Nerd Font"
  font_size: 11
  gtk_theme: Adwaita-dark

network:
  remote_path: tailscale
  rdp_scope: tailscale-only

xrdp:
  sesman_policy: UBD
  install_reconnectwm: true

apps:
  browsers: [edge, chrome]
  markdown_editor: typora
  terminal_tools: [btop, bat, glow]
  file_manager: thunar
  screenshot: flameshot

wm:
  mod_key: Mod1
  workspace_count: 10
  workspace_title_daemon: true
  per_window_titles: false

# Permission tier: prompt before tool use. Convenience features still on.
ai:
  autostart_claude: true
  permission_mode: default
  remote_control_at_startup: true
  use_icm: true
  workspace_hub_name: workspace
  subworkspaces: [uap]
  concierge: true
  chat_bridge: none

boot:
  custom_plymouth: true
  wallpaper: tokyo-night-default
  system_dark_mode: true

locale:
  keyboard_layout: us
  rdp_lcid: "0x00000409"

assets:
  logo: assets/logo.png

components_enabled:
  - plymouth
  - rofi
  - alacritty
  - gtk-theme
  - xinitrc
  - desktop-entries
  - xrdp
  - workspace-title-daemon
  - typora-themes
  - i3
  - workspace-hub
  - claude-settings
